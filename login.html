<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1">
<title>巨量引擎 · 信息流广告营销师认证</title>
<style>
:root {
  --bg: #070a10;
  --surface: #111927;
  --surface2: #182233;
  --border: #1e2a3c;
  --text: #e2e6ec;
  --text2: #8490a2;
  --text3: #5c6678;
  --accent: #c49b40;
  --accent2: #d4af5a;
  --accent-bg: rgba(196,155,64,0.08);
  --accent-border: rgba(196,155,64,0.25);
  --error: #e05555;
  --success: #41a878;
  --radius: 8px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:"PingFang SC","Microsoft YaHei",-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;padding:20px;line-height:1.5;-webkit-tap-highlight-color:transparent}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse 60% 50% at 30% 20%,rgba(196,155,64,0.03) 0%,transparent 60%),
  radial-gradient(ellipse 40% 60% at 70% 80%,rgba(196,155,64,0.02) 0%,transparent 60%);
  pointer-events:none;z-index:0}

.page{width:100%;max-width:420px;position:relative;z-index:1}

/* Brand */
.brand{margin-bottom:32px;text-align:center}
.brand .mark{display:inline-block;width:44px;height:44px;border:1.5px solid var(--accent-border);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--accent);margin-bottom:14px;letter-spacing:1px;background:var(--accent-bg)}
.brand h1{font-size:19px;font-weight:600;color:var(--text);letter-spacing:0.5px}
.brand p{font-size:12.5px;color:var(--text3);margin-top:5px}

/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:28px 26px 22px}

/* Tabs */
.tabs{display:flex;margin-bottom:22px;border-bottom:1px solid var(--border);gap:0}
.tabs button{flex:1;padding:0 0 10px;border:none;background:none;font-size:14px;font-weight:500;cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all .2s;letter-spacing:0.3px}
.tabs button.active{color:var(--accent);border-bottom-color:var(--accent)}

/* Forms */
.form{display:none}
.form.active{display:block}
.field{margin-bottom:14px}
.field label{display:block;font-size:11.5px;font-weight:500;color:var(--text2);margin-bottom:5px;letter-spacing:0.3px}
.field input{width:100%;height:44px;padding:0 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:14px;background:var(--surface2);color:var(--text);outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--accent-border)}
.field input::placeholder{color:var(--text3)}

/* Buttons */
.btn{width:100%;height:44px;background:var(--accent);color:#0a0e16;border:none;border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;letter-spacing:0.3px}
.btn:hover{background:var(--accent2)}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-out{width:100%;height:38px;background:transparent;color:var(--text2);border:1px solid var(--border);border-radius:var(--radius);font-size:13px;cursor:pointer;margin-top:10px}

/* Msg */
.msg{display:none;font-size:12px;text-align:center;margin-top:10px;padding:8px;border-radius:6px}
.msg.error{display:block;color:var(--error);background:rgba(224,85,85,0.08)}
.msg.success{display:block;color:var(--success);background:rgba(65,168,120,0.08)}

/* Links */
.link-row{margin-top:16px;text-align:center;font-size:12.5px;color:var(--text3)}
.link-row a{color:var(--accent);text-decoration:none;cursor:pointer;font-weight:500}
.link-row a:hover{opacity:.8}
.forgot-link{display:block;text-align:right;font-size:11.5px;color:var(--text3);margin-top:-8px;margin-bottom:14px;cursor:pointer}
.forgot-link:hover{color:var(--accent)}

/* Quick login */
.quick-login{margin-top:18px;display:none}
.quick-login.show{display:block}
.quick-login .ql-title{font-size:11px;color:var(--text3);text-align:center;margin-bottom:8px}
.quick-login .ql-list{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.quick-login .ql-btn{padding:5px 14px;border:1px solid var(--border);border-radius:20px;background:var(--surface2);font-size:12px;cursor:pointer;color:var(--text2)}
.quick-login .ql-btn:hover{border-color:var(--accent-border);color:var(--accent)}

/* Stats */
.stats{text-align:center;margin-top:24px;display:flex;justify-content:center;gap:28px}
.stats .s{text-align:center}
.stats .sn{font-size:18px;font-weight:600;color:var(--accent)}
.stats .sl{font-size:11px;color:var(--text3);margin-top:2px}

/* Footer */
.foot{text-align:center;margin-top:16px;font-size:11px;color:var(--text3);opacity:.6}

/* Modal */
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:99;align-items:center;justify-content:center;padding:20px}
.modal.show{display:flex}
.modal .mc{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:24px 22px;width:100%;max-width:380px}
.modal .mc h3{font-size:15px;margin-bottom:16px}
.modal .mc .close-row{text-align:right;margin-top:14px}
.modal .mc .close-row a{color:var(--text3);cursor:pointer;font-size:13px;text-decoration:none}
.modal .mc .close-row a:hover{color:var(--accent)}

@media(max-width:480px){
  .card{padding:22px 18px 18px}
  .brand{margin-bottom:24px}
  .brand h1{font-size:17px}
  .stats{gap:20px}
}
</style>
</head>
<body>
<div class="page">

<div class="brand">
  <div class="mark">JL</div>
  <h1>信息流广告营销师认证 · 题库</h1>
  <p>巨量引擎 · 数字营销效果信息流</p>
</div>

<div class="card">
  <div class="tabs">
    <button id="tabLogin" class="active">登录</button>
    <button id="tabRegister">注册</button>
  </div>

  <div class="form active" id="formLogin">
    <div class="field"><label>用户名</label><input type="text" id="lu" placeholder="输入用户名" autocomplete="username"></div>
    <div class="field"><label>密码</label><input type="password" id="lp" placeholder="输入密码" autocomplete="current-password"></div>
    <a class="forgot-link" id="forgotLink">忘记密码？</a>
    <button class="btn" id="loginBtn" onclick="doLogin()">登 录</button>
    <div class="msg" id="loginMsg"></div>

    <div class="quick-login" id="quickLogin">
      <div class="ql-title">本设备最近登录</div>
      <div class="ql-list" id="qlList"></div>
    </div>

    <div class="link-row">没有账号？<a id="toRegister">注册 →</a></div>
  </div>

  <div class="form" id="formRegister">
    <div class="field"><label>邀请码</label><input type="text" id="rc" placeholder="向管理员购买邀请码" autocomplete="off"></div>
    <div class="field"><label>用户名</label><input type="text" id="ru" placeholder="设置用户名" autocomplete="off"></div>
    <div class="field"><label>密码</label><input type="password" id="rp" placeholder="设置登录密码（至少4位）" autocomplete="new-password"></div>
    <button class="btn" id="regBtn" onclick="doRegister()">注 册</button>
    <div class="msg" id="regMsg"></div>

    <div class="link-row">已有账号？<a id="toLogin">登录 →</a></div>
  </div>
</div>

<div class="stats">
  <div class="s"><div class="sn">1494</div><div class="sl">真题</div></div>
  <div class="s"><div class="sn">4</div><div class="sl">题库</div></div>
  <div class="s"><div class="sn">32</div><div class="sl">课程</div></div>
  <div class="s"><div class="sn">9</div><div class="sl">模块</div></div>
</div>

<div class="foot">认证考试辅导系统 · 2026</div>

</div>

<!-- Reset Password Modal -->
<div class="modal" id="resetModal">
  <div class="mc">
    <h3>重置密码</h3>
    <p style="font-size:12px;color:var(--text2);margin-bottom:14px">输入注册时使用的邀请码来验证身份</p>
    <div class="field"><label>用户名</label><input type="text" id="rstUser" placeholder="输入你的用户名"></div>
    <div class="field"><label>邀请码</label><input type="text" id="rstCode" placeholder="输入注册时使用的邀请码"></div>
    <div class="field"><label>新密码</label><input type="password" id="rstPass" placeholder="设置新密码（至少4位）"></div>
    <button class="btn" onclick="doResetPassword()">重置密码</button>
    <div class="msg" id="resetMsg"></div>
    <div class="close-row"><a onclick="closeReset()">取消</a></div>
  </div>
</div>

<script>
var API_BASE = 'http://175.178.204.24/api';

function $(id){ return document.getElementById(id); }
function getToken(){ return localStorage.getItem('ad_quiz_token'); }
function setToken(t){ localStorage.setItem('ad_quiz_token', t); }

async function apiFetch(path, options){
  options = options || {};
  var headers = options.headers || {};
  var token = getToken();
  if(token) headers['Authorization'] = 'Bearer ' + token;
  headers['Content-Type'] = headers['Content-Type'] || 'application/json';
  var resp = await fetch(API_BASE + path, {
    method: options.method || 'GET',
    headers: headers,
    body: options.body ? JSON.stringify(options.body) : undefined
  });
  if(resp.status === 401 && (options.method||'GET') !== 'POST'){
    localStorage.removeItem('ad_quiz_token');
    localStorage.removeItem('ad_quiz_session');
    throw new Error('Unauthorized');
  }
  var data = await resp.json();
  if(!resp.ok) throw new Error(data.detail || 'Error');
  return data;
}

function saveSession(username, token){
  localStorage.setItem('ad_quiz_session', JSON.stringify({
    user: username, token: token,
    createdAt: Date.now(),
    expires: Date.now() + (7*24*60*60*1000)
  }));
  setToken(token);
}

function getRedirect(){
  var params = new URLSearchParams(location.search);
  var r = params.get('redirect');
  var safe = ['index.html','quiz.html','quiz_v2.html','quiz_v3.html','quiz_v4.html','courses.html'];
  if(r){
    var fn = r.split('/').pop().split('?')[0];
    if(safe.indexOf(fn) !== -1) return fn;
  }
  return 'index.html';
}

function showMsg(elId, text, type){
  var el = $(elId);
  el.textContent = text;
  el.className = 'msg ' + type;
}
function hideMsg(elId){ $(elId).className = 'msg'; }

// Tabs
function switchTab(t){
  var isLogin = t === 'login';
  $('tabLogin').className = isLogin ? 'active' : '';
  $('tabRegister').className = isLogin ? '' : 'active';
  $('formLogin').className = isLogin ? 'form active' : 'form';
  $('formRegister').className = isLogin ? 'form' : 'form active';
  hideMsg('loginMsg'); hideMsg('regMsg');
}

$('tabLogin').onclick = function(){ switchTab('login'); };
$('tabRegister').onclick = function(){ switchTab('register'); };
$('toRegister').onclick = function(){ switchTab('register'); };
$('toLogin').onclick = function(){ switchTab('login'); };

// Login
async function doLogin(){
  hideMsg('loginMsg');
  var u = $('lu').value.trim(), p = $('lp').value.trim();
  if(!u){ showMsg('loginMsg','请输入用户名','error'); return; }
  if(!p){ showMsg('loginMsg','请输入密码','error'); return; }
  $('loginBtn').disabled = true; $('loginBtn').textContent = '登录中…';
  try{
    var data = await apiFetch('/auth/login',{method:'POST',body:{username:u,password:p}});
    saveSession(data.user.username, data.token);
    location.href = getRedirect();
  }catch(e){
    showMsg('loginMsg', e.message === 'Invalid username or password' ? '用户名或密码错误' : (e.message||'登录失败'), 'error');
    $('loginBtn').disabled = false; $('loginBtn').textContent = '登 录';
  }
}

// Register
async function doRegister(){
  hideMsg('regMsg');
  var c = $('rc').value.trim(), u = $('ru').value.trim(), p = $('rp').value.trim();
  if(!c){ showMsg('regMsg','请输入邀请码','error'); return; }
  if(!u || u.length<2){ showMsg('regMsg','用户名至少2个字符','error'); return; }
  if(u.length>20){ showMsg('regMsg','用户名最多20个字符','error'); return; }
  if(!p || p.length<4){ showMsg('regMsg','密码至少4位','error'); return; }
  $('regBtn').disabled = true; $('regBtn').textContent = '注册中…';
  try{
    var data = await apiFetch('/auth/register',{method:'POST',body:{invite_code:c,username:u,password:p}});
    saveSession(data.user.username, data.token);
    location.href = getRedirect();
  }catch(e){
    var m = e.message;
    if(m.indexOf('already used')!==-1) m = '此邀请码已被使用';
    else if(m.indexOf('already exists')!==-1) m = '用户名已存在';
    else if(m.indexOf('invalid')!==-1) m = '邀请码无效';
    showMsg('regMsg', m||'注册失败','error');
    $('regBtn').disabled = false; $('regBtn').textContent = '注 册';
  }
}

// Reset password
$('forgotLink').onclick = function(){
  $('resetModal').classList.add('show');
  $('rstUser').value = $('lu').value.trim();
  hideMsg('resetMsg');
};

function closeReset(){
  $('resetModal').classList.remove('show');
  $('rstUser').value = ''; $('rstCode').value = ''; $('rstPass').value = '';
  hideMsg('resetMsg');
}

async function doResetPassword(){
  hideMsg('resetMsg');
  var u = $('rstUser').value.trim(), c = $('rstCode').value.trim(), p = $('rstPass').value.trim();
  if(!u){ showMsg('resetMsg','请输入用户名','error'); return; }
  if(!c){ showMsg('resetMsg','请输入邀请码','error'); return; }
  if(!p || p.length<4){ showMsg('resetMsg','新密码至少4位','error'); return; }
  try{
    await apiFetch('/auth/reset-password',{method:'POST',body:{username:u,invite_code:c,new_password:p}});
    showMsg('resetMsg','密码重置成功！请返回登录','success');
    setTimeout(function(){ closeReset(); }, 2000);
  }catch(e){
    showMsg('resetMsg', e.message||'重置失败','error');
  }
}

$('resetModal').onclick = function(e){ if(e.target === this) closeReset(); };

// Quick login
function renderQuickLogin(){
  var s = localStorage.getItem('ad_quiz_session');
  if(!s) return;
  try{
    var d = JSON.parse(s);
    if(!d.user) return;
    $('quickLogin').classList.add('show');
    $('qlList').innerHTML = '<button class="ql-btn" onclick="quickLogin(\''+
      d.user.replace(/'/g,"\\'")+'\')">'+d.user.replace(/</g,'&lt;')+'</button>';
  }catch(e){}
}
function quickLogin(u){ $('lu').value = u; $('lp').value = ''; $('lp').focus(); }

// Auto-login
async function checkSession(){
  var t = getToken(); if(!t) return;
  try{ var d = await apiFetch('/auth/me'); if(d.username) location.href = getRedirect(); }
  catch(e){ setToken(''); localStorage.removeItem('ad_quiz_session'); }
}

// Enter key
document.addEventListener('keydown',function(e){
  if(e.key !== 'Enter') return;
  if($('resetModal').classList.contains('show')){ e.preventDefault(); doResetPassword(); return; }
  if($('formLogin').classList.contains('active')){ e.preventDefault(); doLogin(); }
  else if($('formRegister').classList.contains('active')){ e.preventDefault(); doRegister(); }
});

renderQuickLogin();
checkSession();
</script>
</body>
</html>
